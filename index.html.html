<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Rush — Endless Car Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --accent: #ff3c3c; --accent2: #ffb800; --ui-bg: rgba(10,10,20,0.88); }
  body {
    background: #0d0d1a; font-family: 'Barlow', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  #wrapper { position: relative; width: 400px; height: 660px; }
  canvas { display: block; border-radius: 18px; border: 2px solid rgba(255,255,255,0.07);
    box-shadow: 0 0 80px rgba(255,60,60,0.12), 0 0 160px rgba(0,0,0,0.7); }
  #hud {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; gap: 6px;
  }
  .hud-box {
    background: var(--ui-bg); border: 1px solid rgba(255,255,255,0.09);
    border-radius: 10px; padding: 5px 12px; color: #fff;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px;
    letter-spacing: 1px; display: flex; flex-direction: column;
    align-items: center; line-height: 1; min-width: 56px;
  }
  .hud-label {
    font-family: 'Barlow', sans-serif; font-size: 8px; font-weight: 700;
    letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 2px;
  }
  #level-box { flex: 1; }
  #xp-bar-wrap { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 4px; overflow: hidden; }
  #xp-bar { height: 100%; background: var(--accent2); border-radius: 3px; transition: width 0.15s; width: 0%; }
  #combo-flash {
    position: absolute; top: 82px; left: 50%; transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif; font-size: 30px;
    color: var(--accent2); text-shadow: 0 0 16px var(--accent2);
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
    white-space: nowrap; letter-spacing: 2px;
  }
  #lvlup-banner {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.6);
    background: rgba(0,0,0,0.92); border: 2px solid var(--accent2);
    border-radius: 16px; padding: 20px 36px; text-align: center;
    pointer-events: none; opacity: 0; transition: opacity 0.25s, transform 0.25s; z-index: 10;
  }
  #lvlup-banner.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  #lvlup-banner .lv-title { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 3px; color: var(--accent2); }
  #lvlup-banner .lv-num { font-family: 'Bebas Neue', sans-serif; font-size: 54px; color: #fff; line-height: 1; }
  #lvlup-banner .lv-sub { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 4px; letter-spacing: 1px; }
  #overlay {
    position: absolute; inset: 0; border-radius: 18px;
    background: rgba(0,0,0,0.84); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    backdrop-filter: blur(5px); z-index: 20;
  }
  #overlay h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: 62px; color: #fff;
    letter-spacing: 5px; line-height: 1; text-shadow: 0 0 40px var(--accent);
  }
  #overlay .sub { font-size: 12px; color: rgba(255,255,255,0.45); letter-spacing: 2px; text-transform: uppercase; }
  #overlay .score-big { font-family: 'Bebas Neue', sans-serif; font-size: 76px; color: var(--accent2); line-height: 1; }
  #overlay .stat-row { display: flex; gap: 20px; }
  #overlay .stat { text-align: center; }
  #overlay .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #fff; }
  #overlay .stat-lbl { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }
  .play-btn {
    background: var(--accent); color: #fff; border: none;
    font-family: 'Bebas Neue', sans-serif; font-size: 26px;
    letter-spacing: 3px; padding: 12px 44px; border-radius: 50px; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 28px rgba(255,60,60,0.5); margin-top: 4px;
  }
  .play-btn:hover { transform: scale(1.05); }
  .play-btn:active { transform: scale(0.96); }
  #mobile-controls {
    position: absolute; bottom: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; pointer-events: none;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 14px; color: #fff; font-size: 24px;
    width: 70px; height: 58px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; pointer-events: all; user-select: none; -webkit-user-select: none; transition: background 0.1s;
  }
  .ctrl-btn:active { background: rgba(255,60,60,0.3); }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c" width="400" height="660"></canvas>
  <div id="hud">
    <div class="hud-box">
      <span class="hud-label">Score</span>
      <span id="score-display">0</span>
    </div>
    <div class="hud-box" id="level-box">
      <span class="hud-label">Level</span>
      <span id="level-display">0</span>
      <div id="xp-bar-wrap"><div id="xp-bar"></div></div>
    </div>
    <div class="hud-box">
      <span class="hud-label">Best</span>
      <span id="best-display">0</span>
    </div>
  </div>
  <div id="combo-flash"></div>
  <div id="lvlup-banner">
    <div class="lv-title">Level Up!</div>
    <div class="lv-num" id="lvlup-num">1</div>
    <div class="lv-sub" id="lvlup-sub"></div>
  </div>
  <div id="overlay">
    <div class="sub">Dodge traffic · Collect coins · Reach Lv.100</div>
    <h1>Road<br>Rush</h1>
    <button class="play-btn" id="start-btn">START GAME</button>
  </div>
  <div id="mobile-controls">
    <div class="ctrl-btn" id="btn-left">&#9664;</div>
    <div class="ctrl-btn" id="btn-right">&#9654;</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 400, H = 660;
const LANES = [72, 162, 252, 342];
const CAR_W = 38, CAR_H = 64, COIN_R = 10;
const MAX_LEVEL = 100;

function xpForLevel(lv) { return 80 + lv * 22; }

let state = 'menu';
let score, best = 0, level, xp, combo, comboTimer;
let player, traffic, coins, particles, roadY, speed, spawnTimer, coinTimer;
let comboFlashTO, lvlupTO, animId, lastTs, crashFlash, totalCoins;

const keys = {};
document.addEventListener('keydown', e => {
  if (!keys[e.key]) { keys[e.key] = true; if (state === 'play') handleKey(e.key); }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('btn-left').addEventListener('pointerdown', () => { if (state==='play') movePlayer(-1); });
document.getElementById('btn-right').addEventListener('pointerdown', () => { if (state==='play') movePlayer(1); });
document.getElementById('start-btn').addEventListener('click', startGame);

function handleKey(k) {
  if (k === 'ArrowLeft') movePlayer(-1);
  if (k === 'ArrowRight') movePlayer(1);
}

function movePlayer(dir) {
  const li = LANES.indexOf(player.tx);
  const ni = Math.max(0, Math.min(LANES.length - 1, li + dir));
  player.tx = LANES[ni];
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  score = 0; level = 0; xp = 0; combo = 0; comboTimer = 0; crashFlash = 0; totalCoins = 0;
  speed = 3.5; spawnTimer = 0; coinTimer = 0;
  player = { x: LANES[1], tx: LANES[1], y: H - 110 };
  traffic = []; coins = []; particles = [];
  roadY = 0; state = 'play'; lastTs = null;
  if (animId) cancelAnimationFrame(animId);
  updateHUD();
  animId = requestAnimationFrame(loop);
}

function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 16.67, 3);
  lastTs = ts;
  if (state === 'play') update(dt);
  draw();
  if (state === 'play' || state === 'crashing') animId = requestAnimationFrame(loop);
}

function update(dt) {
  speed = 3.5 + level * 0.13 + score * 0.0004;
  roadY = (roadY + speed * dt) % 60;
  score += dt * (0.35 + level * 0.015);
  xp += dt * (0.3 + level * 0.01);
  checkLevelUp();
  updateHUD();

  if (crashFlash > 0) crashFlash -= dt;
  player.x += (player.tx - player.x) * 0.2 * dt;

  spawnTimer -= dt;
  const minSpawn = Math.max(8, 28 - level * 0.2);
  if (spawnTimer <= 0) { spawnTraffic(); spawnTimer = minSpawn + Math.random() * 22; }

  coinTimer -= dt;
  if (coinTimer <= 0) { spawnCoins(); coinTimer = 42 + Math.random() * 28; }

  for (let i = traffic.length - 1; i >= 0; i--) {
    const t = traffic[i];
    t.y += (speed + t.extra) * dt;
    if (t.y > H + 100) { traffic.splice(i, 1); continue; }
    if (collides(player, t)) { doCrash(); return; }
  }

  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.y += speed * dt * 0.85;
    if (c.y > H + 20) { coins.splice(i, 1); continue; }
    if (Math.hypot(player.x - c.x, player.y - c.y) < COIN_R + 20) {
      combo++; comboTimer = 110;
      score += 4 + combo * 0.5;
      xp += 3 + combo * 0.5;
      totalCoins++;
      spawnCoinFx(c.x, c.y);
      coins.splice(i, 1);
      if (combo >= 5) showCombo(combo);
    }
  }

  if (comboTimer > 0) comboTimer -= dt; else combo = 0;

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 0.18 * dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function doCrash() {
  if (score > best) best = score;
  spawnCrashFx(player.x, player.y);
  state = 'crashing';
  setTimeout(showGameOver, 900);
}

function checkLevelUp() {
  if (level >= MAX_LEVEL) { xp = 0; return; }
  const need = xpForLevel(level);
  if (xp >= need) {
    xp -= need;
    level++;
    showLvlUpBanner(level);
  }
}

function showLvlUpBanner(lv) {
  const subs = {
    5: 'Getting faster!', 10: 'Traffic increases!', 15: 'Speed boost!',
    20: 'Danger zone!', 30: 'Madness!', 40: 'Insane speed!',
    50: 'HALFWAY THERE!', 75: 'Almost legendary!', 100: 'MAX LEVEL! Legend!'
  };
  const b = document.getElementById('lvlup-banner');
  document.getElementById('lvlup-num').textContent = lv;
  document.getElementById('lvlup-sub').textContent = subs[lv] || (lv % 10 === 0 ? 'New milestone!' : 'Keep going!');
  b.classList.add('show');
  clearTimeout(lvlupTO);
  lvlupTO = setTimeout(() => b.classList.remove('show'), 1500);
}

function showCombo(n) {
  const el = document.getElementById('combo-flash');
  el.textContent = 'x' + n + ' COMBO!';
  el.style.opacity = '1';
  clearTimeout(comboFlashTO);
  comboFlashTO = setTimeout(() => { el.style.opacity = '0'; }, 800);
}

function showGameOver() {
  state = 'over';
  updateHUD();
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `
    <div class="sub">Crashed!</div>
    <div class="score-big">${Math.floor(score)}</div>
    <div class="stat-row">
      <div class="stat"><div class="stat-val">Lv.${level}</div><div class="stat-lbl">Level</div></div>
      <div class="stat"><div class="stat-val">${totalCoins}</div><div class="stat-lbl">Coins</div></div>
      <div class="stat"><div class="stat-val">${Math.floor(best)}</div><div class="stat-lbl">Best</div></div>
    </div>
    <button class="play-btn" id="restart-btn">RETRY</button>
  `;
  document.getElementById('restart-btn').addEventListener('click', startGame);
}

function updateHUD() {
  document.getElementById('score-display').textContent = Math.floor(score);
  document.getElementById('best-display').textContent = Math.floor(best);
  document.getElementById('level-display').textContent = level >= MAX_LEVEL ? '100' : level;
  const pct = level >= MAX_LEVEL ? 100 : Math.min(100, Math.floor(xp / xpForLevel(level) * 100));
  document.getElementById('xp-bar').style.width = pct + '%';
}

function collides(a, b) {
  return Math.abs(a.x - b.x) < CAR_W * 0.65 && Math.abs(a.y - b.y) < CAR_H * 0.65;
}

function spawnTraffic() {
  const usedLanes = new Set();
  const count = Math.random() < (0.18 + level * 0.004) ? 2 : 1;
  for (let i = 0; i < count; i++) {
    let lane, tries = 0;
    do { lane = LANES[Math.floor(Math.random() * LANES.length)]; tries++; }
    while (usedLanes.has(lane) && tries < 10);
    usedLanes.add(lane);
    traffic.push({ x: lane, y: -80, extra: Math.random() * (1 + level * 0.06), color: rndColor() });
  }
}

function spawnCoins() {
  const lane = LANES[Math.floor(Math.random() * LANES.length)];
  const count = 3 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) coins.push({ x: lane, y: -30 - i * 38 });
}

function spawnCrashFx(x, y) {
  for (let i = 0; i < 28; i++) {
    const a = (Math.PI * 2 / 28) * i + Math.random() * 0.3;
    const spd = 2 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 1,
      life: 35 + Math.random()*20, color: i%3===0?'#ffb800':'#ff3c3c', r: 3 + Math.random()*5 });
  }
  for (let i = 0; i < 10; i++) {
    particles.push({ x: x+(Math.random()-0.5)*30, y: y+(Math.random()-0.5)*20,
      vx: (Math.random()-0.5)*2, vy: -Math.random()*3,
      life: 40, color: '#666', r: 5 + Math.random()*7 });
  }
}

function spawnCoinFx(x, y) {
  for (let i = 0; i < 7; i++) {
    const a = Math.random() * Math.PI * 2;
    particles.push({ x, y, vx: Math.cos(a)*2.5, vy: Math.sin(a)*2.5 - 2, life: 18, color: '#ffcc00', r: 2 + Math.random()*3 });
  }
}

function rndColor() {
  return ['#378ADD','#1D9E75','#D4537E','#EF9F27','#7F77DD','#5DCAA5','#4fc3f7','#a5d6a7'][Math.floor(Math.random()*8)];
}

// ── Draw ──────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawRoad();
  drawCoins();
  drawTrafficCars();
  drawParticles();
  const flicker = state === 'crashing' && Math.floor(Date.now() / 80) % 2 === 0;
  if (!flicker) drawPlayerCar();
  if (state === 'crashing') {
    ctx.fillStyle = 'rgba(255,60,60,0.22)';
    ctx.fillRect(0, 0, W, H);
  }
}

function drawRoad() {
  ctx.fillStyle = '#13131f';
  ctx.fillRect(0, 0, W, H);
  const darkness = Math.min(25, level * 0.25);
  ctx.fillStyle = `rgb(${34 - darkness|0},${34 - darkness|0},${56 - darkness|0})`;
  ctx.fillRect(38, 0, 324, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(38,0); ctx.lineTo(38,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(362,0); ctx.lineTo(362,H); ctx.stroke();
  ctx.setLineDash([28, 32]);
  ctx.strokeStyle = 'rgba(240,192,64,0.28)';
  ctx.lineWidth = 3;
  [118, 200, 282].forEach(x => {
    ctx.beginPath(); ctx.moveTo(x, roadY - 60); ctx.lineTo(x, roadY + H); ctx.stroke();
  });
  ctx.setLineDash([]);
  // XP progress bar on road bottom
  if (state === 'play' || state === 'crashing') {
    const pct = level >= MAX_LEVEL ? 1 : Math.min(1, xp / xpForLevel(level));
    ctx.fillStyle = 'rgba(255,184,0,0.15)';
    ctx.fillRect(38, H - 4, 324 * pct, 4);
    ctx.fillStyle = 'rgba(255,184,0,0.65)';
    ctx.fillRect(38, H - 4, 324 * pct, 2);
  }
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0, 'rgba(8,8,16,0.65)');
  grad.addColorStop(0.12, 'rgba(8,8,16,0)');
  grad.addColorStop(0.88, 'rgba(8,8,16,0)');
  grad.addColorStop(1, 'rgba(8,8,16,0.65)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawPlayerCar() {
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.fillStyle = '#e83030';
  rr(-CAR_W/2, -CAR_H/2, CAR_W, CAR_H, 7); ctx.fill();
  ctx.fillStyle = '#c01010';
  rr(-CAR_W/2, 0, CAR_W, CAR_H/2, [0,0,7,7]); ctx.fill();
  ctx.fillStyle = '#111';
  rr(-CAR_W/2+1,-CAR_H/2+2,11,12,3); ctx.fill();
  rr(CAR_W/2-12,-CAR_H/2+2,11,12,3); ctx.fill();
  rr(-CAR_W/2+1,CAR_H/2-14,11,12,3); ctx.fill();
  rr(CAR_W/2-12,CAR_H/2-14,11,12,3); ctx.fill();
  ctx.fillStyle = 'rgba(160,220,255,0.82)';
  rr(-CAR_W/2+5,-CAR_H/2+15,CAR_W-10,16,3); ctx.fill();
  ctx.fillStyle = 'rgba(255,230,80,0.95)';
  rr(-CAR_W/2+3,-CAR_H/2-5,8,5,2); ctx.fill();
  rr(CAR_W/2-11,-CAR_H/2-5,8,5,2); ctx.fill();
  ctx.fillStyle = '#ff4444';
  rr(-CAR_W/2+3,CAR_H/2,8,5,2); ctx.fill();
  rr(CAR_W/2-11,CAR_H/2,8,5,2); ctx.fill();
  if (level > 10) {
    const alpha = Math.min(0.55, (level - 10) * 0.013);
    ctx.strokeStyle = `rgba(255,80,80,${alpha})`;
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const len = 10 + i * 9;
      ctx.beginPath(); ctx.moveTo(-5+i*5, CAR_H/2+4); ctx.lineTo(-5+i*5, CAR_H/2+4+len); ctx.stroke();
    }
  }
  ctx.restore();
}

function drawTrafficCars() {
  for (const t of traffic) {
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.fillStyle = t.color;
    rr(-CAR_W/2,-CAR_H/2,CAR_W,CAR_H,7); ctx.fill();
    ctx.fillStyle = darken(t.color, 18);
    rr(-CAR_W/2,0,CAR_W,CAR_H/2,[0,0,7,7]); ctx.fill();
    ctx.fillStyle = '#111';
    rr(-CAR_W/2+1,-CAR_H/2+2,11,12,3); ctx.fill();
    rr(CAR_W/2-12,-CAR_H/2+2,11,12,3); ctx.fill();
    rr(-CAR_W/2+1,CAR_H/2-14,11,12,3); ctx.fill();
    rr(CAR_W/2-12,CAR_H/2-14,11,12,3); ctx.fill();
    ctx.fillStyle = 'rgba(160,220,255,0.7)';
    rr(-CAR_W/2+5,-CAR_H/2+15,CAR_W-10,16,3); ctx.fill();
    ctx.fillStyle = 'rgba(255,80,80,0.75)';
    rr(-CAR_W/2+3,CAR_H/2,8,5,2); ctx.fill();
    rr(CAR_W/2-11,CAR_H/2,8,5,2); ctx.fill();
    ctx.restore();
  }
}

function drawCoins() {
  for (const c of coins) {
    ctx.save();
    ctx.translate(c.x, c.y);
    const pulse = 0.88 + Math.sin(Date.now()*0.007 + c.y*0.1) * 0.12;
    ctx.scale(pulse, pulse);
    const g = ctx.createRadialGradient(0,0,2,0,0,COIN_R);
    g.addColorStop(0,'#fffaaa'); g.addColorStop(0.4,'#ffcc00'); g.addColorStop(1,'#e07000');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0,0,COIN_R,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(-3,-3,3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life / 35);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function rr(x, y, w, h, r) {
  const tl = Array.isArray(r)?r[0]:r, tr = Array.isArray(r)?r[1]:r;
  const br = Array.isArray(r)?r[2]:r, bl = Array.isArray(r)?r[3]:r;
  ctx.beginPath();
  ctx.moveTo(x+tl,y); ctx.lineTo(x+w-tr,y); ctx.quadraticCurveTo(x+w,y,x+w,y+tr);
  ctx.lineTo(x+w,y+h-br); ctx.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
  ctx.lineTo(x+bl,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-bl);
  ctx.lineTo(x,y+tl); ctx.quadraticCurveTo(x,y,x+tl,y);
  ctx.closePath();
}

function darken(hex, pct) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const f=1-pct/100;
  return '#'+[r,g,b].map(c=>Math.max(0,Math.round(c*f)).toString(16).padStart(2,'0')).join('');
}

draw();
</script>
</body>
</html>
